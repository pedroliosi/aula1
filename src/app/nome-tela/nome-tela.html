<div class="card bg-base-100 shadow-md">
  <div class="card-body">
    <h2 class="card-title text-primary">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H9v-2a2 2 0 01.586-1.414z" />
      </svg>
      Nome na Tela — Two-Way Data Binding
    </h2>
    <div class="divider"></div>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Digite seu nome</legend>
      <input
        [(ngModel)]="nome"
        type="text"
        id="nome"
        name="nome"
        placeholder="Ex: Pedro"
        class="input input-primary w-full"
      />
    </fieldset>
    <div class="alert alert-info mt-4" *ngIf="nome">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z" />
      </svg>
      <span>Olá, <strong>{{ nome }}</strong>!</span>
    </div>
    <fieldset class="fieldset mt-2">
      <legend class="fieldset-legend">Digite uma URL</legend>
      <input
        [(ngModel)]="url"
        name="url"
        id="url"
        type="text"
        placeholder="Ex: google.com"
        class="input input-primary w-full"
      />
      <a
        *ngIf="url"
        [href]="fullUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-primary btn-sm mt-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
        Abrir link
      </a>
    </fieldset>
  </div>
</div>
